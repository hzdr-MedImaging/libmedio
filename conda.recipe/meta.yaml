package:
  name: libmedio
  version: {{ environ["PROJECT_VERSION"] }}

source:
  path: ..

requirements:
  build:
    - cmake
    - librtdebug

build:

  # already linked relative to $ORIGIN, so we need to turn
  # off conda's relocation mechanism because it screws it up
  binary_relocation: false

about:
  summary: 'MedIO library'
  description: |
    libmedio supporting medical imaging data formats
  home: https://github.com/hzdr-MedImaging/libmedio
  license: Apache-2.0
