name: CI
on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        name: jens-maus/librtdebug
        ref: refs/heads/release
    - name: compile+install librtdebug
      run: bash ./configure
    - name: make
      run: make
    - name: make test
      run: make test
